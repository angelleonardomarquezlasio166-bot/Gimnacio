<!DOCTYPE html>
<html lang="es">
<head>
   <meta charset="UTF-8">
   <title>Administración - CRUD</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
   <nav class="navbar navbar-expand-lg navbar-dark mb-4">
       <div class="container">
           <span class="navbar-brand fw-bold text-warning text-uppercase">Área de Control Administrativo (CRUD)</span>
           <div class="navbar-nav ms-auto"><a class="btn btn-danger btn-sm text-white" href="login.html" style="background-color:#dc3545; border:none;">Salir</a></div>
       </div>
   </nav>
   <div class="container my-5">
       <div class="row g-4">
           <div class="col-md-4">
               <div class="card p-4 shadow">
                   <h5 class="text-warning text-uppercase fw-bold mb-3">Registrar Nuevo Socio</h5>
                  <form id="formCrud">
    <input type="hidden" id="crudId">

    <div class="mb-3">
        <label class="text-white-50 small">Nombre Socio</label>
        <input type="text" id="crudNombre" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="text-white-50 small">Correo Electrónico</label>
        <input type="email" id="crudCorreo" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="text-white-50 small">Contraseña</label>
        <input type="password" id="crudPass" class="form-control" value="12345" required>
    </div>

    <div class="mb-3">
        <label class="text-white-50 small">Membresía (1=Básico, 2=Premium)</label>
        <input type="number" id="crudPlan" class="form-control" value="1" min="1" max="2" required>
    </div>

    <button type="submit" class="btn btn-warning w-100 fw-bold mt-2">
        GUARDAR CLIENTE
    </button>
</form>
               </div>
           </div>
           <div class="col-md-8">
               <div class="card p-4 shadow">
                   <h5 class="text-uppercase fw-bold mb-3 text-white">Socios en el Sistema (READ / DELETE)</h5>
                   <table class="table table-striped align-middle border:none;">
                       <thead><tr><th>ID</th><th>Nombre / Correo</th><th>Membresía</th><th>Operaciones</th></tr></thead>
                       <tbody id="tablaUsuarios"></tbody>
                   </table>
               </div>
           </div>
       </div>
   </div>
   <script src="../js/validaciones.js"></script>
</body>
</html>
